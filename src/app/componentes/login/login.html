<main class="page-shell">
  <section class="auth-card">
    <div class="auth-header">
      <div class="brand-icon"><i class="fa-solid fa-scissors"></i></div>
      <h1>Iniciar sesión</h1>
      <p>Accede a tu cuenta y reserva tu próxima cita.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" class="form-grid">
      <label class="field-group">
        <span>Email</span>
        <input type="email" formControlName="correo" placeholder="tucorreo@ejemplo.com">
        @if (correo?.invalid && (correo?.dirty || correo?.touched)) {
          <small class="field-error" *ngIf="correo?.errors?.['required']">El email es obligatorio.</small>
          <small class="field-error" *ngIf="correo?.errors?.['email']">Ingresa un email válido.</small>
        }
      </label>

      <label class="field-group">
        <span>Contraseña</span>
        <input type="password" formControlName="contrasena" placeholder="●●●●●●●" autocomplete="current-password">
        @if (contrasena?.invalid && (contrasena?.dirty || contrasena?.touched)) {
          <small class="field-error" *ngIf="contrasena?.errors?.['required']">La contraseña es obligatoria.</small>
        }
      </label>

      <button type="submit" class="btn btn-primary">Ingresar</button>

      <div class="auth-footer">
        <p>¿No tienes cuenta? <a routerLink="/registro">Regístrate</a></p>
      </div>
    </form>
  </section>
</main>
