<main class="page-shell">
  <section class="auth-card">
    <div class="auth-header">
      <div class="brand-icon"><i class="fa-solid fa-key"></i></div>
      <h1>Recuperar contraseña</h1>
      <p>Ingresa tu correo para recibir un código de recuperación.</p>
    </div>

    <form [formGroup]="recuperarForm" (ngSubmit)="submit()" class="form-grid">
      <label class="field-group">
        <span>Email</span>
        <input type="email" formControlName="correo" placeholder="tucorreo@ejemplo.com">
        @if (correo?.invalid && (correo?.dirty || correo?.touched)) {
          <small class="field-error" *ngIf="correo?.errors?.['required']">El email es obligatorio.</small>
          <small class="field-error" *ngIf="correo?.errors?.['email']">Ingresa un email válido.</small>
        }
      </label>

      <button type="submit" class="btn btn-primary" [disabled]="isLoading">
        @if (isLoading) {
          <i class="fa-solid fa-spinner fa-spin"></i> Enviando...
        } @else {
          Enviar código
        }
      </button>

      <div class="auth-footer">
        <p><a href="javascript:void(0)" (click)="goToLogin()" class="link-back">Volver al login</a></p>
      </div>
    </form>
  </section>
</main>
