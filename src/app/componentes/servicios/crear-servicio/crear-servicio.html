<div class="page-shell">
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand-icon">SB</div>
      <h1>Crear Servicio</h1>
      <p>Registra un nuevo servicio de la barbería</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">

      <div class="field-group">
        <span>Nombre</span>
        <input formControlName="nombre" />
        <div *ngIf="form.get('nombre')?.touched && form.get('nombre')?.invalid" class="field-error">Nombre es requerido</div>
      </div>

      <div class="field-group">
        <span>Descripción</span>
        <input formControlName="descripcion" />
        <div *ngIf="form.get('descripcion')?.touched && form.get('descripcion')?.invalid" class="field-error">Descripción es requerida</div>
      </div>

      <div class="field-group">
        <span>Tipo</span>
        <select formControlName="tipo">
          <option *ngFor="let t of tipos" [value]="t">{{t}}</option>
        </select>
      </div>

      <div class="field-group">
        <span>Precio</span>
        <input type="number" formControlName="precio" />
      </div>

      <div class="field-group">
        <span>Duración (minutos)</span>
        <input type="number" formControlName="duracionMinutos" />
      </div>

      <div class="field-group">
        <span>Imagen URL</span>
        <input formControlName="imagenUrl" />
      </div>

      <div class="field-group">
        <label><input type="checkbox" formControlName="activo" /> Activo</label>
      </div>

      <button class="btn" type="submit">Guardar Servicio</button>

    </form>
  </div>
</div>
