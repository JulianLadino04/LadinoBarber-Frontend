<header class="main-header">
  <div class="header-container">
    <a routerLink="/" class="brand-link">
      <div class="brand-mark"><i class="fa-solid fa-scissors"></i></div>
      <div class="brand-copy">
        <span class="brand-title">Ladino Barber</span>
        <span class="brand-subtitle">Estilo profesional</span>
      </div>
    </a>

    <nav class="nav-panel">
      <a routerLink="/">Inicio</a>
      <a routerLink="/" fragment="servicios">Servicios</a>
      <a routerLink="/" fragment="barberos">Barberos</a>
      <a routerLink="/" fragment="reservas">Reservas</a>
    </nav>

    <div class="actions-section">
      @if (!isLogged) {
        <a routerLink="/login" class="btn btn-outline">Login</a>
        <a routerLink="/registro" class="btn btn-primary">Registro</a>
      } @else {
        <div class="user-box">
          <span class="welcome-text">Hola, {{ user }}</span>
          <span class="role-badge">{{ rol }}</span>
        </div>
        <button type="button" (click)="logout()" class="btn btn-primary">Cerrar sesión</button>
      }
    </div>
  </div>
</header>
