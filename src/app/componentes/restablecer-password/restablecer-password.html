<main class="page-shell">
  <section class="auth-card">
    <div class="auth-header">
      <div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
      <h1>Restablecer contraseña</h1>
      <p>Ingresa el código y tu nueva contraseña.</p>
    </div>

    <form [formGroup]="restablecerForm" (ngSubmit)="submit()" class="form-grid">
      <label class="field-group">
        <span>Código de recuperación</span>
        <input type="text" formControlName="codigoRecuperacion" placeholder="Ingresa el código recibido">
        @if (codigoRecuperacion?.invalid && (codigoRecuperacion?.dirty || codigoRecuperacion?.touched)) {
          <small class="field-error" *ngIf="codigoRecuperacion?.errors?.['required']">El código es obligatorio.</small>
        }
      </label>

      <label class="field-group">
        <span>Nueva contraseña</span>
        <input type="password" formControlName="nuevaContrasena" placeholder="●●●●●●●" autocomplete="new-password">
        @if (nuevaContrasena?.invalid && (nuevaContrasena?.dirty || nuevaContrasena?.touched)) {
          <small class="field-error" *ngIf="nuevaContrasena?.errors?.['required']">La contraseña es obligatoria.</small>
          <small class="field-error" *ngIf="nuevaContrasena?.errors?.['minlength']">Mínimo 7 caracteres.</small>
        }
      </label>

      <label class="field-group">
        <span>Confirmar contraseña</span>
        <input type="password" formControlName="confirmarContrasena" placeholder="●●●●●●●" autocomplete="new-password">
        @if (confirmarContrasena?.invalid && (confirmarContrasena?.dirty || confirmarContrasena?.touched)) {
          <small class="field-error" *ngIf="confirmarContrasena?.errors?.['required']">Debes confirmar la contraseña.</small>
        }
      </label>

      @if (restablecerForm.hasError('passwordMismatch') && (nuevaContrasena?.touched || confirmarContrasena?.touched)) {
        <small class="field-error form-error">Las contraseñas no coinciden.</small>
      }

      <button type="submit" class="btn btn-primary" [disabled]="isLoading">
        @if (isLoading) {
          <i class="fa-solid fa-spinner fa-spin"></i> Restableciendo...
        } @else {
          Restablecer contraseña
        }
      </button>

      <div class="auth-footer">
        <p><a href="javascript:void(0)" (click)="goToLogin()" class="link-back">Volver al login</a></p>
      </div>
    </form>
  </section>
</main>
